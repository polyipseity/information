# Dependabot configuration
# <https://docs.github.com/en/code-security/supply-chain-security/keeping-your-dependencies-updated-automatically/configuration-options-for-dependency-updates>

version: 2

registries:
  # <https://github.com/dependabot/dependabot-core/issues/8027#issuecomment-1779394703>
  github-private:
    type: git
    url: https://github.com
    username: x-access-token
    password: ${{secrets.CHECKOUT_GITHUB_TOKEN}}

updates:
  # Bun (bun.lock)
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "build"
      prefix-development: "chore"
      include: "scope"
    groups:
      bun:
        patterns:
          - "*"
      bun-security:
        applies-to: "security-updates"
        patterns:
          - "*"
    cooldown:
      default-days: 5
    exclude-paths:
      # Meant to be vulnerable
      - "special/academia/HKUST/COMP 3633/presentation 10/examples"
    registries:
      # Make all submodules clone successfully
      - github-private

  # GitHub Actions (workflow dependencies)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "build"
      prefix-development: "chore"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "*"
      github-actions-security:
        applies-to: "security-updates"
        patterns:
          - "*"
    cooldown:
      default-days: 5
    registries:
      # Make all submodules clone successfully
      - github-private

  # Git submodules (gitmodules)
  - package-ecosystem: "gitsubmodule"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "build"
      prefix-development: "chore"
      include: "scope"
    groups:
      gitsubmodule:
        patterns:
          - "*"
      gitsubmodule-security:
        applies-to: "security-updates"
        patterns:
          - "*"
    cooldown:
      default-days: 5
    registries:
      # Make all submodules clone successfully
      - github-private

  # NPM & pnpm (package.json, pnpm-lock.yaml, etc.)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "build"
      prefix-development: "chore"
      include: "scope"
    groups:
      npm:
        patterns:
          - "*"
      npm-security:
        applies-to: "security-updates"
        patterns:
          - "*"
    cooldown:
      default-days: 5
    exclude-paths:
      # Meant to be vulnerable
      - "special/academia/HKUST/COMP 3633/presentation 10/examples"
    registries:
      # Make all submodules clone successfully
      - github-private

  # Python (pyproject.toml)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "build"
      prefix-development: "chore"
      include: "scope"
    groups:
      uv:
        patterns:
          - "*"
      uv-security:
        applies-to: "security-updates"
        patterns:
          - "*"
    cooldown:
      default-days: 5
    exclude-paths:
      # wtf: <https://github.com/dependabot/dependabot-core/issues/13960>
      - "LICENSE.txt"
    registries:
      # Make all submodules clone successfully
      - github-private
