  <section>
    <h2><span id="BOTH">BOTH</span></h2>
    <p>
      Text before the math
      <span
        class="mwe-math-element mwe-math-element-block"
        typeof="mw:Extension/math"
        data-mw='{"name":"math","attrs":{"display":"block"},"body":{"extsrc":"f(x)"}}'
        ><span
          class="mwe-math-mathml-display mwe-math-mathml-a11y"
          style="
            clip: rect(1px, 1px, 1px, 1px);
            overflow: hidden;
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
          "
          ><math
            xmlns="http://www.w3.org/1998/Math/MathML"
            display="block"
            alttext="{\displaystyle f(x)}"
            ><semantics
              ><mrow
                ><mi>f</mi><mo stretchy="false">(</mo><mi>x</mi
                ><mo stretchy="false">)</mo></mrow
              ></semantics
            ></math
          ><img
            class="mwe-math-fallback-image-display mw-invert skin-invert"
            src="data:image/svg+xml;base64," /></span
      ></span>
      and text after the math.
    </p>
